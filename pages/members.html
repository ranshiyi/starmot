<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学友档案 - 星光共创读书会</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .member-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    padding: 24px 20px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .member-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
  }
  .member-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: #fff;
  }
  .member-name { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 2px; }
  .member-nick { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
  .member-industry { font-size: 12px; color: #64748b; margin-bottom: 10px; }
  .member-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .member-tag {
    padding: 3px 8px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
    background: #ede9fe; color: #6d28d9;
  }
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    border: 1px solid #e2e8f0; background: #fff;
    cursor: pointer; transition: all 0.2s;
    color: #475569;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #fef3c7; border-color: #f59e0b; color: #d97706;
  }
  .search-box {
    width: 100%; max-width: 360px; padding: 10px 16px;
    border: 1px solid #e2e8f0; border-radius: 12px;
    font-size: 14px; outline: none; margin-bottom: 20px;
  }
  .search-box:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="../index.html" class="nav-logo">
      <span>🐾</span>星光共创读书会
    </a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="groups.html">班级自治</a>
      <a href="members.html" class="active">学友档案</a>
      <a href="knowledge.html">知识点库</a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1>📋 学友档案</h1>
    <p>认识每一位学友，了解他们的故事与专长</p>
  </div>

  <input type="text" class="search-box" id="search-box" placeholder="搜索学友姓名 / 行业 / 标签...">

  <div class="filter-bar" id="filter-bar"></div>

  <div class="member-grid" id="member-grid"></div>

</div>

<!-- 页脚 -->
<div style="text-align:center; padding:32px 0; color:#94a3b8; font-size:13px; margin-top:40px;">
  🐾 MOT星光共创读书会 · 006期 · 学友自主管理
</div>

<script>
let allMembers = [];

fetch('../data/members.json')
  .then(r => r.json())
  .then(data => {
    allMembers = data.members;
    renderFilters();
    renderMembers(allMembers);
  });

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const allTags = [...new Set(allMembers.flatMap(m => m.tags))];
  let html = '<button class="filter-btn active" onclick="filterByTag(\'all\', this)">全部</button>';
  allTags.forEach(tag => {
    html += `<button class="filter-btn" onclick="filterByTag('${tag}', this)">${tag}</button>`;
  });
  bar.innerHTML = html;
}

function filterByTag(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tag === 'all') renderMembers(allMembers);
  else renderMembers(allMembers.filter(m => m.tags.includes(tag)));
}

function renderMembers(list) {
  const grid = document.getElementById('member-grid');
  if (list.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#94a3b8;">没有找到匹配的学友</p>'; return; }
  
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#f97316'];
  grid.innerHTML = list.map((m, i) => {
    const avatarColor = colors[i % colors.length];
    const tagsHTML = m.tags.map(t => `<span class="member-tag">${t}</span>`).join('');
    return `
      <a class="member-card" href="member-detail.html?id=${m.id}">
        <div class="member-avatar" style="background:linear-gradient(135deg, ${avatarColor}, ${avatarColor}dd)">${m.name[0]}</div>
        <div class="member-name">${m.name}</div>
        <div class="member-nick">${m.nickname || ''}</div>
        <div class="member-industry">${m.industry}</div>
        <div class="member-tags">${tagsHTML}</div>
      </a>
    `;
  }).join('');
}

// 搜索
document.getElementById('search-box').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderMembers(allMembers); return; }
  renderMembers(allMembers.filter(m =>
    m.name.toLowerCase().includes(q) ||
    m.nickname.toLowerCase().includes(q) ||
    m.industry.toLowerCase().includes(q) ||
    m.tags.some(t => t.toLowerCase().includes(q))
  ));
});
</script>
</body>
</html>
