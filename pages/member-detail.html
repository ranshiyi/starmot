<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学友详情 - 星光共创读书会</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; color: #64748b; font-weight: 500;
    margin-bottom: 24px; cursor: pointer;
    transition: color 0.2s;
  }
  .back-link:hover { color: #f59e0b; }
  .profile-header {
    background: #fff; border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    padding: 40px 32px; text-align: center;
    margin-bottom: 28px;
  }
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: #fff;
  }
  .profile-name { font-size: 24px; font-weight: 900; color: #1e293b; margin-bottom: 4px; }
  .profile-nick { font-size: 14px; color: #94a3b8; margin-bottom: 12px; }
  .profile-industry { font-size: 14px; color: #64748b; margin-bottom: 16px; }
  .profile-period {
    display: inline-block; padding: 6px 16px; border-radius: 12px;
    background: #fef3c7; color: #d97706; font-size: 13px; font-weight: 700;
  }
  .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
  .profile-tag {
    padding: 5px 12px; border-radius: 10px;
    font-size: 12px; font-weight: 600;
    background: #ede9fe; color: #6d28d9;
  }
  .bio-section {
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    padding: 24px; margin-bottom: 28px;
  }
  .bio-section h3 { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 12px; }
  .bio-text { font-size: 14px; color: #374151; line-height: 1.9; }
  .not-found {
    text-align: center; padding: 80px 20px; color: #94a3b8; font-size: 16px;
  }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="../index.html" class="nav-logo">
      <span>🐾</span>星光共创读书会
    </a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="groups.html">班级自治</a>
      <a href="members.html">学友档案</a>
      <a href="knowledge.html">知识点库</a>
    </div>
  </div>
</nav>

<div class="container">
  <a class="back-link" onclick="history.back()">← 返回学友列表</a>
  <div id="profile-content"></div>
</div>

<!-- 页脚 -->
<div style="text-align:center; padding:32px 0; color:#94a3b8; font-size:13px; margin-top:40px;">
  🐾 MOT星光共创读书会 · 006期 · 学友自主管理
</div>

<script>
const params = new URLSearchParams(location.search);
const memberId = params.get('id');

const avatarColors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#f97316'];

function getAvatarBg(index) {
  return `linear-gradient(135deg, ${avatarColors[index % avatarColors.length]}, ${avatarColors[index % avatarColors.length]}dd)`;
}

fetch('../data/members.json')
  .then(r => r.json())
  .then(data => {
    const m = data.members.find(x => x.id === memberId);
    const container = document.getElementById('profile-content');
    if (!m) {
      container.innerHTML = '<div class="not-found">未找到该学友信息</div>';
      return;
    }
    const idx = data.members.indexOf(m);
    const tagsHTML = m.tags.map(t => `<span class="profile-tag">${t}</span>`).join('');
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar" style="background:${getAvatarBg(idx)}">${m.name[0]}</div>
        <div class="profile-name">${m.name}</div>
        ${m.nickname ? `<div class="profile-nick">（${m.nickname}）</div>` : ''}
        <div class="profile-industry">${m.industry}</div>
        <div class="profile-period">006期学友</div>
        <div class="profile-tags">${tagsHTML}</div>
      </div>
      <div class="bio-section">
        <h3>📖 个人简介</h3>
        <div class="bio-text">${m.bio}</div>
      </div>
    `;
    document.title = `${m.name} - 学友档案 - 星光共创读书会`;
  });
</script>
</body>
</html>
