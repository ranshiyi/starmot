<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学友笔记 - 星光共创读书会</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .notes-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 28px 24px;
    background: linear-gradient(135deg, #059669, #10b981);
    border-radius: 20px;
    color: #fff;
  }
  .notes-header h1 { font-size: 22px; margin-bottom: 6px; }
  .notes-header p { font-size: 13px; opacity: 0.9; }
  .notes-count {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
  }

  /* 筛选栏 */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 18px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
    border: 1px solid #e2e8f0; background: #fff;
    cursor: pointer; transition: all 0.2s; color: #475569;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #d1fae5; border-color: #059669; color: #059669;
  }

  /* 笔记卡片 */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .note-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }
  .note-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.1);
  }

  .note-card-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid #f1f5f9;
  }

  .note-author {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .note-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .note-author-name { font-size: 14px; font-weight: 700; color: #1e293b; }
  .note-author-batch { font-size: 11px; color: #94a3b8; }

  .note-title {
    font-size: 16px; font-weight: 800; color: #1e293b;
    margin-bottom: 6px; line-height: 1.4;
  }
  .note-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: #94a3b8;
  }
  .note-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 8px; border-radius: 8px;
    font-size: 11px; font-weight: 500;
  }
  .chip-chapter { background: #fef3c7; color: #b45309; }
  .chip-date { background: #ede9fe; color: #6d28d9; }
  .chip-status { background: #d1fae5; color: #059669; }
  .chip-pending { background: #fef3c7; color: #b45309; }

  .note-body {
    padding: 16px 22px 20px;
    flex: 1;
  }
  .note-preview {
    font-size: 13px; color: #475569; line-height: 1.8;
    display: -webkit-box; -webkit-line-clamp: 6;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .note-footer {
    padding: 12px 22px;
    border-top: 1px solid #f1f5f9;
    display: flex; justify-content: space-between; align-items: center;
    background: #fafafa;
  }
  .note-expand-btn {
    font-size: 12px; font-weight: 600; color: #059669;
    cursor: pointer; transition: opacity 0.2s;
    background: none; border: none; padding: 0;
  }
  .note-expand-btn:hover { opacity: 0.7; }
  .note-like {
    font-size: 12px; color: #94a3b8;
  }

  /* 详情模态框 */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 1000;
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal-box {
    background: #fff; border-radius: 24px;
    max-width: 680px; width: 100%; max-height: 85vh;
    overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 28px 28px 16px;
    border-bottom: 1px solid #e2e8f0;
    position: sticky; top: 0; background: #fff; z-index: 1;
    border-radius: 24px 24px 0 0;
  }
  .modal-close {
    float: right; width: 32px; height: 32px;
    border-radius: 50%; border: none; background: #f1f5f9;
    font-size: 18px; cursor: pointer; color: #64748b;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: #e2e8f0; color: #1e293b; }

  .modal-body { padding: 24px 28px 28px; }
  .modal-content {
    font-size: 14px; color: #374151; line-height: 2;
    white-space: pre-wrap;
  }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #94a3b8;
  }
  .empty-state-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state-text { font-size: 15px; margin-bottom: 8px; }
  .empty-state-hint { font-size: 13px; }

  @media (max-width: 768px) {
    .notes-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="../index.html" class="nav-logo"><span>🐾</span>星光共创读书会</a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="groups.html">班级自治</a>
      <a href="members.html">学友档案</a>
      <a href="notes.html" class="active">学友笔记</a>
      <a href="knowledge.html">知识点库</a>
    </div>
  </div>
</nav>

<div class="container">

  <!-- 页面头部 -->
  <div class="notes-header">
    <h1>📝 学友笔记墙</h1>
    <p>学友们的 MOT 读书心得与感悟，点击卡片查看完整内容</p>
    <div class="notes-count" id="notesCount">加载中...</div>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- 笔记列表 -->
  <div class="notes-grid" id="notesGrid"></div>

</div>

<!-- 详情模态框 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalAuthor"></div>
      <h2 id="modalTitle" style="font-size:18px; font-weight:800; color:#1e293b; margin-top:8px;"></h2>
      <div id="modalMeta" style="margin-top:8px;"></div>
    </div>
    <div class="modal-body">
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
</div>

<!-- 页脚 -->
<div style="text-align:center; padding:32px 0; color:#94a3b8; font-size:13px; margin-top:40px;">
  🐾 MOT星光共创读书会 · 006期 · 学友自主管理
</div>

<script>
let allNotes = [];
let currentFilter = 'all';

// 加载笔记数据
fetch('../data/notes.json')
  .then(r => r.json())
  .then(data => {
    allNotes = data.notes || [];
    renderFilters();
    renderNotes();
  })
  .catch(() => {
    document.getElementById('notesGrid').innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">暂无笔记数据</div>
        <div class="empty-state-hint">学友们提交的笔记将在这里展示</div>
      </div>`;
    document.getElementById('notesCount').textContent = `共 0 篇笔记`;
  });

// 渲染筛选按钮
function renderFilters() {
  const chapters = ['all'];
  const seen = {};
  allNotes.forEach(n => {
    if (!seen[n.chapter]) {
      chapters.push(n.chapter);
      seen[n.chapter] = true;
    }
  });

  const container = document.getElementById('filterBar');
  container.innerHTML = chapters.map(ch =>
    `<button class="filter-btn ${ch === currentFilter ? 'active' : ''}" onclick="setFilter('${ch}')">${ch === 'all' ? '📚 全部章节' : '第' + ch + '章'}</button>`
  ).join('');
}

// 设置筛选
function setFilter(ch) {
  currentFilter = ch;
  renderFilters();
  renderNotes();
}

// 渲染笔记列表
function renderNotes() {
  const filtered = currentFilter === 'all'
    ? allNotes
    : allNotes.filter(n => n.chapter === currentFilter);

  document.getElementById('notesCount').textContent = `共 ${filtered.length} 篇笔记`;

  if (filtered.length === 0) {
    document.getElementById('notesGrid').innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">暂无该筛选条件下的笔记</div>
      </div>`;
    return;
  }

  // 按日期排序（最新的在前面）
  filtered.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const avatarColors = ['#f59e0b', '#ef4444', '#06b6d4', '#8b5cf6', '#ec4899', '#10b981', '#6366f1'];

  document.getElementById('notesGrid').innerHTML = filtered.map((note, i) => {
    const color = avatarColors[i % avatarColors.length];
    const initial = (note.name || '?')[0];
    const statusClass = note.status === '已发布' ? 'chip-status' : 'chip-pending';
    const preview = (note.content || '').length > 150
      ? (note.content || '').substring(0, 150) + '...'
      : (note.content || '');

    return `
    <div class="note-card">
      <div class="note-card-header">
        <div class="note-author">
          <div class="note-avatar" style="background:${color}">${initial}</div>
          <div>
            <div class="note-author-name">${note.name}${note.nickname ? (' · ' + note.nickname) : ''}</div>
            <div class="note-author-batch">第 ${note.batch || '006'} 期</div>
          </div>
        </div>
        <div class="note-title">${escapeHtml(note.title)}</div>
        <div class="note-meta">
          <span class="note-chip chip-chapter">📖 第${note.chapter || '?'}章</span>
          <span class="note-chip chip-date">📅 ${note.date || ''}</span>
          <span class="note-chip ${statusClass}">${note.status || '已发布'}</span>
        </div>
      </div>
      <div class="note-body">
        <div class="note-preview">${escapeHtml(preview)}</div>
      </div>
      <div class="note-footer">
        <button class="note-expand-btn" onclick='openNote(${JSON.stringify(note).replace(/'/g, "&#39;")})'>📖 阅读全文 →</button>
        <div class="note-note-id">#${String(i + 1).padStart(2, '0')}</div>
      </div>
    </div>`}).join('');
}

// 打开详情
function openNote(note) {
  document.getElementById('modalAuthor').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:36px;height:36px;border-radius:50%;background:${['#f59e0b','#ef4444','#06b6d4'][Math.floor(Math.random()*3)]};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">${(note.name||'?')[0]}</div>
      <span style="font-size:14px;font-weight:600;color:#1e293b;">${escapeHtml(note.name)}${note.nickname ? '（'+note.nickname+'）' : ''}</span>
    </div>`;
  document.getElementById('modalTitle').textContent = note.title;
  document.getElementById('modalMeta').innerHTML = `
    <span class="note-chip chip-chapter">📖 第${note.chapter||'?'}章</span>
    <span class="note-chip chip-date">📅 ${note.date||''}</span>
    <span class="note-chip chip-status">${note.status||'已发布'}</span>`;
  document.getElementById('modalContent').textContent = note.content || '';
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// 关闭详情
function closeModal(e) {
  if (e && e.target !== e.currentTarget && e.target.className !== 'modal-close') return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ESC 关闭
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
